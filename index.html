<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTER • BRIGADE ANTI-GANG v6.3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Roboto+Mono:wght@400;700&display=swap');
        :root { --green: #00ff9d; --accent: #00cc7a; --dark: #0a0a0a; --darker: #000000; --card: #111111; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--darker); color: var(--green); font-family: 'Roboto Mono', monospace; font-size: 16px; overflow: hidden; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0,255,157,.025) 50%); background-size: 100% 3px; pointer-events: none; animation: scan 6s linear infinite; z-index: 9999; }
        @keyframes scan { 0%{background-position:0 0} 100%{background-position:0 100%} }
        #notification-container { position: fixed; bottom: 25px; right: 25px; z-index: 30000; display: flex; flex-direction: column; gap: 12px; }
        .notification { background: var(--card); border: 2px solid var(--green); padding: 16px 20px; box-shadow: 0 0 30px rgba(0,255,157,0.4); display: flex; gap: 14px; animation: notifyPop 0.5s ease; border-radius: 4px; }
        .notification.success { border-color: var(--green); }
        .notification.error { border-color: #ff4444; color: #ff4444; }
        .header { background: rgba(10,10,10,0.95); border-bottom: 2px solid var(--green); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,255,157,0.15); }
        .header h1 { font-family: 'VT323', monospace; font-size: 34px; letter-spacing: 6px; text-shadow: 0 0 15px var(--green); }
        .container { display: flex; height: calc(100vh - 72px); }
        .sidebar { width: 300px; background: var(--card); border-right: 2px solid var(--green); padding: 25px; overflow-y: auto; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: var(--card); border: 2px solid var(--green); padding: 24px; margin-bottom: 25px; border-radius: 6px; box-shadow: 0 0 20px rgba(0,255,157,0.2); }
        input, textarea, button { font-family: 'Roboto Mono', monospace; font-size: 16px; background: #0a0a0a; border: 2px solid var(--green); color: var(--green); padding: 12px; width: 100%; margin-bottom: 12px; border-radius: 4px; }
        button { cursor: pointer; transition: all 0.3s; font-weight: 700; }
        button:hover { background: var(--green); color: #000; box-shadow: 0 0 25px var(--green); }
        .gang-btn { display: inline-block; padding: 10px 18px; margin: 6px 4px; border: 2px solid var(--green); background: #0a0a0a; cursor: pointer; border-radius: 4px; }
        .gang-btn.active { background: var(--green); color: #000; }
        .terminal { background: #000; border: 2px solid var(--green); padding: 18px; height: 420px; overflow-y: auto; font-size: 15px; white-space: pre-wrap; border-radius: 4px; line-height: 1.5; }
        .chrono-entry { background: #0a0a0a; border-left: 5px solid var(--green); padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin: 15px 0; }
        .media-item { position: relative; border: 2px solid #222; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="notification-container"></div>

    <!-- LOGIN -->
    <div id="login-screen">
        <div style="background:var(--card); border:4px solid var(--green); padding:50px 70px; text-align:center; box-shadow:0 0 40px var(--green);">
            <h1 style="font-size:42px; margin-bottom:25px;">CRYPTER • ANTI-GANG</h1>
            <input type="password" id="password-input" placeholder="MOT DE PASSE" style="font-size:26px; padding:18px; width:100%;">
            <button onclick="checkPassword()" style="font-size:24px; padding:18px; width:100%;">CONNEXION</button>
            <p style="margin-top:30px; opacity:0.6;">Version 6.3 • Modification & Suppression restaurées</p>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-app" style="display:none;">
        <div class="header">
            <h1>CRYPTER • BRIGADE ANTI-GANG</h1>
            <button onclick="logout()" style="background:#300; border:2px solid #f00; color:#f00; padding:10px 20px;">DÉCONNEXION</button>
        </div>

        <div class="container">
            <div class="sidebar">
                <h2 style="margin-bottom:20px;">📂 GANGS</h2>
                <div id="color-select"></div>
            </div>

            <div class="main">
                <div class="card">
                    <h2>➕ NOUVEAU DOSSIER D'ENQUÊTE</h2>
                    <input type="text" id="dossier-name" placeholder="Nom du dossier (ex: Opération Phoenix)">
                    <p style="margin:12px 0 8px;">GANG PRINCIPAL :</p>
                    <div id="color-select-main"></div>

                    <h3 style="margin:25px 0 12px;">👤 Suspect</h3>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <input type="text" id="prenom" placeholder="Prénom">
                        <input type="text" id="nom" placeholder="Nom de famille">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <input type="date" id="date-naissance">
                        <input type="text" id="lieu-residence" placeholder="Lieu de résidence">
                    </div>
                    <input type="text" id="surnom" placeholder="Surnom / Alias">
                    <textarea id="notes" rows="3" placeholder="Note initiale..."></textarea>
                    <p style="margin:15px 0 8px;">📸 Photos & Vidéos :</p>
                    <input type="file" id="media-input" accept="image/*,video/*" multiple>
                    <button onclick="creerDossierAvecSuspect()" style="font-size:21px; padding:16px; margin-top:15px;">CRÉER DOSSIER + SUSPECT</button>
                </div>

                <div class="card">
                    <h2 style="margin-bottom:15px;">📋 DOSSIERS EXISTANTS</h2>
                    <div id="liste-dossiers" class="terminal"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DÉTAIL + MODIFICATION -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20000; align-items:center; justify-content:center;">
        <div style="background:var(--card); border:3px solid var(--green); width:92%; max-width:1100px; max-height:94vh; overflow-y:auto; padding:30px; border-radius:8px;">
            <h2 id="modal-title" style="margin-bottom:10px;"></h2>
            <div id="modal-info" style="margin-bottom:25px; font-size:15px;"></div>

            <h3>Suivi Chronologique</h3>
            <div id="modal-historique"></div>

            <div style="margin-top:30px; border-top:2px solid var(--green); padding-top:20px;">
                <h3>Ajouter une nouvelle entrée</h3>
                <textarea id="edit-notes" rows="3" placeholder="Nouvelle note / action..."></textarea>
                <input type="file" id="edit-media-input" accept="image/*,video/*" multiple>
                <button onclick="ajouterEntreeChronologique()" style="background:var(--accent); color:#000; margin-top:10px;">💾 Ajouter au suivi</button>
            </div>

            <div style="margin-top:30px; display:flex; gap:15px;">
                <button onclick="closeModal()" style="flex:1;">FERMER</button>
                <button onclick="supprimerSuspectActuel()" style="background:#300; border:3px solid #f00; color:#f00;">🗑️ SUPPRIMER CE SUSPECT</button>
                <button onclick="supprimerDossierActuel()" style="background:#300; border:3px solid #f00; color:#f00;">🗑️ SUPPRIMER TOUT LE DOSSIER</button>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD = "brigadeantigang2026";
        const GANGS = { "BALLAS":"Ballas","VAGOS":"Vagos","MARABUNTA":"Marabunta","PEAKYBLINDERS":"Peaky Blinders","YAKUZA":"Yakuza","LOSTMC":"Lost MC","ITALIANMAFIA":"Italian Mafia","HAITIEN":"Haitien","FAMILIES":"Families","NARCOS":"Narcos" };

        let currentDossier = null;
        let currentSuspect = null;

        function showNotification(msg, type="success") {
            const c = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = `notification ${type}`;
            n.innerHTML = `<span>${type==='success'?'✅':'❌'}</span><span>${msg}</span><span onclick="this.parentElement.remove()" style="margin-left:auto;cursor:pointer;">✕</span>`;
            c.appendChild(n);
            setTimeout(()=>n.remove(),4500);
        }

        function checkPassword() {
            if (document.getElementById('password-input').value.trim() === PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                initApp();
                showNotification("Connexion réussie", "success");
            } else showNotification("Mot de passe incorrect", "error");
        }

        function logout() { if(confirm("Déconnexion ?")) location.reload(); }

        function initApp() {
            const conts = [document.getElementById('color-select'), document.getElementById('color-select-main')];
            conts.forEach(cont => {
                cont.innerHTML = '';
                Object.keys(GANGS).forEach(g => {
                    const b = document.createElement('div');
                    b.className = `gang-btn ${g}`;
                    b.textContent = g;
                    b.onclick = () => {
                        document.querySelectorAll('.gang-btn').forEach(btn => btn.classList.remove('active'));
                        b.classList.add('active');
                        currentColor = g;
                    };
                    cont.appendChild(b);
                });
            });
            rafraichirListe();
        }

        let currentColor = null;

        function creerDossierAvecSuspect() {
            const dossierName = document.getElementById('dossier-name').value.trim() || "Dossier Sans Nom";
            const prenom = document.getElementById('prenom').value.trim();
            const nomFamille = document.getElementById('nom').value.trim().toUpperCase();
            const fullName = `${prenom} ${nomFamille}`.trim();

            if (!fullName) return showNotification("Prénom et Nom obligatoires", "error");
            if (!currentColor) return showNotification("Choisis un gang", "error");

            let data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');

            if (!data[dossierName]) data[dossierName] = { gang: currentColor, dateCreation: new Date().toLocaleString('fr-FR'), suspects: {} };

            const files = document.getElementById('media-input').files;
            const promises = Array.from(files).map(f => new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r({data: e.target.result, type: f.type});
                reader.readAsDataURL(f);
            }));

            Promise.all(promises).then(media => {
                if (!data[dossierName].suspects[fullName]) {
                    data[dossierName].suspects[fullName] = {
                        prenom, nom: nomFamille,
                        dateNaissance: document.getElementById('date-naissance').value || "Non renseignée",
                        residence: document.getElementById('lieu-residence').value.trim() || "Non renseignée",
                        surnom: document.getElementById('surnom').value.trim() || "-",
                        historique: []
                    };
                }

                data[dossierName].suspects[fullName].historique.unshift({
                    date: new Date().toLocaleString('fr-FR'),
                    action: document.getElementById('notes').value.trim() || "(Note initiale)",
                    media: media
                });

                localStorage.setItem('dossiers_gangs_v6_3', JSON.stringify(data));
                resetForm();
                showNotification(`Dossier mis à jour - ${fullName} ajouté`, "success");
                rafraichirListe();
            });
        }

        function resetForm() {
            document.getElementById('dossier-name').value = '';
            document.getElementById('prenom').value = '';
            document.getElementById('nom').value = '';
            document.getElementById('date-naissance').value = '';
            document.getElementById('lieu-residence').value = '';
            document.getElementById('surnom').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('media-input').value = '';
            currentColor = null;
            document.querySelectorAll('.gang-btn').forEach(b => b.classList.remove('active'));
        }

        function rafraichirListe() {
            const container = document.getElementById('liste-dossiers');
            let data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');
            let html = Object.keys(data).length === 0 ? 'Aucun dossier...' : '';

            Object.keys(data).forEach(dossier => {
                const d = data[dossier];
                html += `📁 ${dossier} | ${d.gang}\n`;
                html += '─'.repeat(80) + '\n';
                Object.keys(d.suspects).forEach(suspect => {
                    const s = d.suspects[suspect];
                    const last = s.historique[0] ? s.historique[0].action.substring(0,65) + '...' : '';
                    html += `   👤 ${suspect} | ${s.residence}\n`;
                    html += `       ${last}\n\n`;
                });
            });
            container.innerHTML = `<pre onclick="ouvrirModal(event)" style="cursor:pointer">${html}</pre>`;
        }

        function ouvrirModal(e) {
            const text = e.target.textContent;
            const dossierMatch = text.match(/📁\s+([^\n|]+)/);
            const suspectMatch = text.match(/👤\s+([^\n]+)/);

            if (!dossierMatch) return;

            currentDossier = dossierMatch[1].trim();
            currentSuspect = suspectMatch ? suspectMatch[1].trim() : null;

            if (currentSuspect) {
                const data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');
                const suspectData = data[currentDossier].suspects[currentSuspect];
                document.getElementById('modal-title').innerHTML = `👤 ${currentSuspect} <small>(${currentDossier})</small>`;
                document.getElementById('modal-info').innerHTML = `Prénom : ${suspectData.prenom} | Naissance : ${suspectData.dateNaissance} | Résidence : ${suspectData.residence}`;
                
                let histHTML = '';
                suspectData.historique.forEach(entry => {
                    histHTML += `<div class="chrono-entry">
                        <strong>${entry.date}</strong><br>
                        ${entry.action}<br>`;
                    if (entry.media && entry.media.length) {
                        histHTML += `<div class="media-grid">`;
                        entry.media.forEach(m => {
                            if (m.type.startsWith('image')) histHTML += `<div class="media-item"><img src="${m.data}"></div>`;
                            else if (m.type.startsWith('video')) histHTML += `<div class="media-item"><video src="${m.data}" controls></video><div class="media-label">VIDEO</div></div>`;
                        });
                        histHTML += `</div>`;
                    }
                    histHTML += `</div>`;
                });
                document.getElementById('modal-historique').innerHTML = histHTML;
                document.getElementById('modal').style.display = 'flex';
            }
        }

        function ajouterEntreeChronologique() {
            const notes = document.getElementById('edit-notes').value.trim();
            if (!notes) return showNotification("Écris une note", "error");

            const files = document.getElementById('edit-media-input').files;
            const promises = Array.from(files).map(f => new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r({data: e.target.result, type: f.type});
                reader.readAsDataURL(f);
            }));

            Promise.all(promises).then(media => {
                let data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');
                data[currentDossier].suspects[currentSuspect].historique.unshift({
                    date: new Date().toLocaleString('fr-FR'),
                    action: notes,
                    media: media
                });
                localStorage.setItem('dossiers_gangs_v6_3', JSON.stringify(data));
                showNotification("Entrée chronologique ajoutée", "success");
                ouvrirModal({target: {textContent: `📁 ${currentDossier}`}}); // refresh
            });
        }

        function supprimerSuspectActuel() {
            if (!confirm("Supprimer définitivement ce suspect ?")) return;
            let data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');
            delete data[currentDossier].suspects[currentSuspect];
            if (Object.keys(data[currentDossier].suspects).length === 0) delete data[currentDossier];
            localStorage.setItem('dossiers_gangs_v6_3', JSON.stringify(data));
            closeModal();
            rafraichirListe();
            showNotification("Suspect supprimé", "info");
        }

        function supprimerDossierActuel() {
            if (!confirm("Supprimer TOUT le dossier et tous ses suspects ?")) return;
            let data = JSON.parse(localStorage.getItem('dossiers_gangs_v6_3') || '{}');
            delete data[currentDossier];
            localStorage.setItem('dossiers_gangs_v6_3', JSON.stringify(data));
            closeModal();
            rafraichirListe();
            showNotification("Dossier supprimé", "info");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            currentDossier = null;
            currentSuspect = null;
        }

        window.onload = () => {};
    </script>
</body>
</html>
